<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود به حساب | MacTech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.003.00/dist/font-face.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-card">
    <div class="logo">💻 <span>Mac</span>Tech</div>
    <h2>ورود به حساب</h2>
    <form id="login-form">
      <div class="mb-3 text-start">
        <label for="username" class="form-label">نام کاربری یا ایمیل</label>
        <input type="text" class="form-control" id="username" placeholder="example@email.com" required>
      </div>
      <div class="mb-3 text-start">
        <label for="password" class="form-label">رمز عبور</label>
        <input type="password" class="form-control" id="password" placeholder="******" required>
      </div>
      <button type="submit" class="btn login-btn w-100 mt-2">ورود</button>
    </form>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit",(e)=>{
      e.preventDefault();
      window.location.href="index.html";
    });
  </script>
</body>
</html>
