<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گزارش خریداران</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.003.00/dist/font-face.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container mt-5">
    <h3 class="mb-3">گزارش خریداران</h3>
    <table class="table table-bordered" id="report-table">
      <thead>
        <tr>
          <th>ردیف</th>
          <th>تاریخ</th>
          <th>نام خریدار</th>
          <th>عنوان کالا</th>
          <th>تعداد</th>
          <th>قیمت واحد</th>
          <th>مبلغ کل</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p class="mt-4">محل امضا: ____________________________</p>
    <button onclick="window.print()" class="btn btn-success mt-3">چاپ گزارش</button>
  </div>

  <script>
    const buyers = JSON.parse(localStorage.getItem("buyers")) || [];
    const tbody = document.querySelector("#report-table tbody");
    buyers.forEach((buyer,indexB)=>{
      buyer.cart.forEach((item,index)=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${indexB+1}-${index+1}</td>
          <td>${buyer.date}</td>
          <td>${buyer.fullname}</td>
          <td>${item.name}</td>
          <td>${item.qty}</td>
          <td>${item.price.toLocaleString()}</td>
          <td>${(item.price*item.qty).toLocaleString()}</td>
        `;
        tbody.appendChild(tr);
      });
    });
  </script>
</body>
</html>
