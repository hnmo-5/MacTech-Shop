<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ثبت اطلاعات خریدار</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.003.00/dist/font-face.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container mt-5">
    <h3 class="mb-3">برای ادامه لطفا فیلدهای زیر را تکمیل کنید</h3>
    <form id="buyer-form" class="d-flex flex-column">
      <input type="text" placeholder="نام و نام خانوادگی" id="fullname" class="form-control mb-2" required>
      <input type="text" placeholder="شماره تماس" id="phone" class="form-control mb-2" required>
      <input type="text" placeholder="استان" id="province" class="form-control mb-2" required>
      <input type="text" placeholder="شهر" id="city" class="form-control mb-2" required>
      <input type="text" placeholder="آدرس" id="address" class="form-control mb-2" required>
      <input type="text" placeholder="پلاک" id="plaque" class="form-control mb-2" required>
      <button type="submit" class="btn btn-primary mt-2">ثبت اطلاعات</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("buyer-form");
    form.addEventListener("submit", e => {
      e.preventDefault();
      const buyer = {
        fullname: document.getElementById("fullname").value,
        phone: document.getElementById("phone").value,
        province: document.getElementById("province").value,
        city: document.getElementById("city").value,
        address: document.getElementById("address").value,
        plaque: document.getElementById("plaque").value,
        date: new Date().toLocaleString(),
        cart: JSON.parse(localStorage.getItem("cart")) || []
      };
      let buyers = JSON.parse(localStorage.getItem("buyers")) || [];
      buyers.push(buyer);
      localStorage.setItem("buyers", JSON.stringify(buyers));
      localStorage.setItem("cart", JSON.stringify([]));
      window.location.href = "fake-payment.html";
    });
  </script>
</body>
</html>
