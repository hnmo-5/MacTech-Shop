<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacTech - فروشگاه مک‌بوک</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.003.00/dist/font-face.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-light bg-white px-3">
    <div class="d-flex align-items-center w-100">
      <div class="logo me-3">💻 <span>Mac</span>Tech</div>
      <div class="ms-auto d-flex align-items-center">
        <button class="btn btn-outline-dark me-2" id="login-btn">👤</button>
        <button class="btn btn-outline-dark" id="cart-btn">🛒 <span id="cart-count">0</span></button>
      </div>
    </div>
  </nav>

  <div class="container mt-3">
    <form id="filter-form" class="row g-2">
      <div class="col-6 col-md-3">
        <select id="color-filter" class="form-select">
          <option value="all">رنگ</option>
          <option value="خاکستری">خاکستری</option>
          <option value="طلایی">طلایی</option>
          <option value="نقره‌ای">نقره‌ای</option>
          <option value="مشکی">مشکی</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <select id="model-filter" class="form-select">
          <option value="all">مدل</option>
          <option value="Air">Air</option>
          <option value="Pro">Pro</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <select id="year-filter" class="form-select">
          <option value="all">سال</option>
          <option value="2020">2020</option>
          <option value="2022">2022</option>
          <option value="2023">2023</option>
          <option value="2024">2024</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <select id="cpu-filter" class="form-select">
          <option value="all">پردازنده</option>
          <option value="M1">M1</option>
          <option value="M2">M2</option>
          <option value="M3">M3</option>
        </select>
      </div>
    </form>
  </div>

  <div class="container mt-3">
    <div class="row" id="products-row"></div>
  </div>

  <div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">سبد خرید</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <ul class="list-group mb-2" id="cart-items"></ul>
          <p>جمع کل: <span id="cart-total">0</span> تومان</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-danger" id="clear-cart">پاک کردن</button>
          <button class="btn btn-primary" id="checkout">پرداخت</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center mt-5 mb-3">تمامی حقوق محفوظ می‌باشد</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
